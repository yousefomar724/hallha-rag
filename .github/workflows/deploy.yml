name: Deploy to VPS

on:
  push:
    branches:
      - main # Change if your default branch is 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            # hallha-node lives at the site path on this VPS (must be a git clone: has .git).
            APP_DIR=/home/alef-team-hallha/htdocs/hallha.alef-team.com

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git repo at $APP_DIR (git pull needs .git here)."
              echo "On the VPS, from an empty docroot or use: git clone <REPO_URL> ."
              exit 1
            fi

            cd "$APP_DIR"

            if [ ! -f package.json ]; then
              echo "No package.json in $APP_DIR — fix APP_DIR or clone the hallha-node repo here"
              exit 1
            fi
            if ! grep -q '"name"[[:space:]]*:[[:space:]]*"hallha-node"' package.json; then
              echo "package.json is not hallha-node — wrong APP_DIR?"
              exit 1
            fi

            # Git 2.35+ "dubious ownership" when repo owner ≠ SSH user (common on shared hosting).
            git config --global --add safe.directory "$APP_DIR"

            git pull origin main

            pnpm install
            pnpm build

            pm2 restart hallha-api
